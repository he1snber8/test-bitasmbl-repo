name: Bitasmbl Validation

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Validate project
        run: echo "Running Bitasmbl validation..."

      - name: Verify Token Existence
        run: |
          if [ -z "${{ secrets.BITASMBL_TOKEN }}" ]; then
            echo "TOKEN IS MISSING"
          else
            echo "TOKEN IS SET: ${{ secrets.BITASMBL_TOKEN }}"
          fi

      - name: Extract metadata from bitasmbl.json
        id: meta
        run: |
          PROJECT_APPLICATION_ID=$(jq -r '.projectApplicationId' bitasmbl.task.json)
          REQUIREMENT_ID=$(jq -r '.requirementId' bitasmbl.task.json)
          echo "project_application_id=$PROJECT_APPLICATION_ID" >> $GITHUB_OUTPUT
          echo "requirement_id=$REQUIREMENT_ID" >> $GITHUB_OUTPUT

      - name: Get git diff
        id: diff
        run: |
          # Get diff and use jq to handle JSON string escaping properly
          DIFF=$(git diff HEAD^ HEAD)
          DIFF_ESCAPED=$(printf '%s' "$DIFF" | jq -Rs .)
          echo "diff=$DIFF_ESCAPED" >> $GITHUB_OUTPUT

      - name: Send to backend
        run: |
          curl -X POST https://04ac-176-221-143-53.ngrok-free.app/projects/evaluate-code-diff \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.BITASMBL_TOKEN }}" \
            -d @- <<EOF
          {
            "projectApplicationId": ${{ steps.meta.outputs.project_application_id }},
            "requirementId": ${{ steps.meta.outputs.requirement_id }},
            "repo": "${{ github.repository }}",
            "commitSha": "${{ github.sha }}",
            "diffs": ${{ steps.diff.outputs.diff }}
          }
          EOF
