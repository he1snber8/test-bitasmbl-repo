name: Debug Diff

on:
  push:

jobs:
  show-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Show git diff
        run: |
          echo "=== DIFF START ==="
          git diff HEAD^ HEAD
          echo "=== DIFF END ==="
